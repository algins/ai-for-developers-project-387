name: opencode-scheduled

on:
  schedule:
    - cron: "0 2 * * *" # Nightly run at 02:00 UTC
  workflow_dispatch: {}

jobs:
  lighthouse-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    env:
      TARGET_URL: ${{ secrets.LIGHTHOUSE_TARGET_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate TARGET_URL
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "ERROR: LIGHTHOUSE_TARGET_URL secret is not set"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run Lighthouse CI
        run: |
          mkdir -p lighthouse-reports
          npx --yes @lhci/cli@0.15.x autorun \
            --collect.url="$TARGET_URL" \
            --collect.numberOfRuns=3 \
            --upload.target=filesystem \
            --upload.outputDir=./lighthouse-reports

      - name: Upload Lighthouse reports artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-report-${{ github.run_number }}
          path: |
            lighthouse-reports/**
            .lighthouseci/**
          if-no-files-found: warn
          retention-days: 14