name: Scheduled Lighthouse Audit

on:
  schedule:
    - cron: "0 2 * * *" # Nightly run at 02:00 UTC
  workflow_dispatch:
    inputs:
      target_url:
        description: "Public URL to audit (optional). If empty, uses LIGHTHOUSE_TARGET_URL secret."
        required: false
        type: string

jobs:
  lighthouse-audit:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
    env:
      TARGET_URL: ${{ github.event.inputs.target_url || secrets.LIGHTHOUSE_TARGET_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Lighthouse CI
        run: |
          mkdir -p lighthouse-reports
          npx --yes @lhci/cli@0.15.x autorun \
            --collect.url="$TARGET_URL" \
            --collect.numberOfRuns=3 \
            --upload.target=filesystem \
            --upload.outputDir=./lighthouse-reports

      - name: Upload Lighthouse reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.run_number }}
          path: |
            lighthouse-reports/**
            .lighthouseci/**
          if-no-files-found: warn
          retention-days: 14

      - name: Run OpenCode follow-up
        if: always() && secrets.OPENCODE_API_KEY != ''
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/kimi-k2.6
          prompt: |
            Run a performance audit for the main pages of the application.
            Compare key metrics (LCP, FID, CLS) with previous results
            stored in docs/performance-baseline.md.
            If any metric degraded by more than 10%, create an issue
            with specific recommendations for improvement.